<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAKEN PRIME — Live Fleet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0a0a14;
    --panel:     rgba(18, 26, 48, 0.82);
    --panel-brd: rgba(223,125,89,0.22);
    --ink:       #e8e6df;
    --ink-dim:   #7c8299;
    --accent:    #df7d59;
    --accent-hi: #f0a37f;
    --blip:      #44ff88;
    --danger:    #ff5566;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    overflow:hidden;
  }

  /* ── Full-viewport map is the stage ─────────────────────── */
  #map{
    position:fixed; inset:0; z-index:0;
    background:#0a0a14;
  }
  .leaflet-container{ background:#0a0a14 !important; }

  /* subtle vignette + scanlines over the map for atmosphere */
  .fx{
    position:fixed; inset:0; z-index:400; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(6,8,16,0.55) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  }

  /* ── HUD panels ─────────────────────────────────────────── */
  .hud{
    position:fixed; z-index:500;
    background:var(--panel);
    border:1px solid var(--panel-brd);
    border-radius:12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow:0 16px 48px rgba(0,0,0,0.5);
  }

  header.hud{
    top:16px; left:16px; right:16px;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px;
    animation: dropIn .6s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:18px; letter-spacing:0.5px; color:var(--accent-hi);
    display:flex; align-items:baseline; gap:10px;
  }
  .brand span{ color:var(--ink-dim); font-weight:500; font-size:12px; }
  nav{ display:flex; align-items:center; gap:20px; }
  nav a{ color:var(--ink-dim); text-decoration:none; font-size:12px; letter-spacing:0.5px; transition:color .15s; }
  nav a:hover{ color:var(--accent-hi); }
  .conn{
    display:flex; align-items:center; gap:7px;
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-dim);
  }
  .conn-dot{ width:8px; height:8px; border-radius:50%; background:var(--blip);
    box-shadow:0 0 0 0 rgba(68,255,136,0.6); animation:pulse 1.8s infinite; }
  .conn.down .conn-dot{ background:var(--danger); animation:none; box-shadow:0 0 8px rgba(255,85,102,0.7); }
  .conn.down{ color:var(--danger); }

  /* Live counter — bottom left */
  .stats.hud{
    left:16px; bottom:16px;
    padding:18px 22px 16px;
    min-width:250px;
    animation: riseIn .6s .15s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .eyebrow{
    color:var(--ink-dim); font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
    display:flex; align-items:center; gap:8px; margin-bottom:6px;
  }
  .pulse-dot{
    width:8px; height:8px; border-radius:50%; background:var(--blip);
    box-shadow:0 0 0 0 rgba(68,255,136,0.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(68,255,136,0.55); }
    70%{ box-shadow:0 0 0 12px rgba(68,255,136,0); }
    100%{ box-shadow:0 0 0 0 rgba(68,255,136,0); }
  }
  .counter{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:clamp(44px, 7vw, 76px); line-height:1;
    color:var(--ink);
    font-variant-numeric: tabular-nums;
    text-shadow:0 0 30px rgba(68,255,136,0.15);
  }
  .counter-label{ color:var(--ink-dim); font-size:11px; margin-top:6px; }
  .substats{
    display:flex; gap:26px; margin-top:14px; padding-top:12px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .substat .num{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px;
    color:var(--accent-hi); font-variant-numeric: tabular-nums;
  }
  .substat .lbl{ color:var(--ink-dim); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }

  /* Leaderboard — right side */
  .leaderboard.hud{
    right:16px; top:76px; bottom:16px;
    width:min(300px, 78vw);
    display:flex; flex-direction:column;
    padding:16px 18px;
    animation: slideIn .6s .25s cubic-bezier(.2,.9,.3,1.2) both;
  }
  .leaderboard h2{
    font-family:'Space Grotesk', sans-serif; font-size:12px; letter-spacing:2px;
    text-transform:uppercase; color:var(--ink-dim); margin:0 0 12px;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  .leaderboard h2 .updated{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.5px; text-transform:none; }
  .lb-scroll{ overflow-y:auto; flex:1; margin-right:-6px; padding-right:6px; }
  .lb-scroll::-webkit-scrollbar{ width:4px; }
  .lb-scroll::-webkit-scrollbar-thumb{ background:rgba(223,125,89,0.3); border-radius:2px; }
  .lb-row{
    display:flex; align-items:center; gap:10px; padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.04);
    font-size:12px;
  }
  .lb-row:last-child{ border-bottom:none; }
  .lb-flag{ font-size:16px; width:22px; text-align:center; flex:none; }
  .lb-name{ flex:1; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-bar-track{ flex:0 0 72px; height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
  .lb-bar{ height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-hi)); border-radius:3px; transition:width .5s ease; }
  .lb-count{ width:30px; text-align:right; color:var(--accent-hi); font-weight:700; font-variant-numeric:tabular-nums; }
  .empty-note{ color:var(--ink-dim); font-size:11px; padding:6px 0; line-height:1.6; }

  footer{
    position:fixed; z-index:500; left:0; right:0; bottom:0;
    text-align:center; color:rgba(124,130,153,0.75); font-size:10px; padding:6px 5vw;
    pointer-events:none;
  }
  footer a{ color:rgba(124,130,153,0.9); pointer-events:auto; }

  /* Markers */
  .kraken-marker{
    width:12px; height:12px; border-radius:50%;
    background:var(--blip);
    box-shadow:0 0 0 0 rgba(68,255,136,0.6), 0 0 10px rgba(68,255,136,0.8);
    animation:pulse 2s infinite;
    border:2px solid #0a0a14;
  }
  .leaflet-popup-content-wrapper{
    background:#16213e; color:var(--ink); border-radius:6px;
    border:1px solid var(--panel-brd);
    font-family:'JetBrains Mono', monospace; font-size:12px;
  }
  .leaflet-popup-tip{ background:#16213e; }
  .leaflet-control-zoom{ border:none !important; margin-bottom:14px !important; }
  .leaflet-control-zoom a{
    background:var(--panel) !important; color:var(--ink) !important;
    border:1px solid var(--panel-brd) !important;
    backdrop-filter:blur(8px);
  }
  .leaflet-control-zoom a:hover{ color:var(--accent-hi) !important; }

  @keyframes dropIn{ from{ opacity:0; transform:translateY(-16px);} to{ opacity:1; transform:none;} }
  @keyframes riseIn{ from{ opacity:0; transform:translateY(16px);} to{ opacity:1; transform:none;} }
  @keyframes slideIn{ from{ opacity:0; transform:translateX(20px);} to{ opacity:1; transform:none;} }

  /* ── Mobile ─────────────────────────────────────────────── */
  @media (max-width: 720px){
    body{ overflow-y:auto; }
    header.hud{ flex-wrap:wrap; gap:8px; padding:10px 14px; }
    nav{ gap:14px; }
    .stats.hud{ left:12px; right:12px; bottom:auto; top:74px; min-width:0; padding:14px 16px 12px; }
    .counter{ font-size:44px; }
    .leaderboard.hud{
      position:fixed; left:12px; right:12px; width:auto;
      top:auto; bottom:12px; max-height:34vh;
    }
    footer{ display:none; }
  }
</style>
</head>
<body>

<div id="map"></div>
<div class="fx"></div>

<header class="hud">
  <div class="brand">⚔ KRAKEN PRIME<span>live fleet</span></div>
  <nav>
    <span class="conn" id="conn"><span class="conn-dot"></span><span id="conn-txt">online</span></span>
    <a href="https://github.com/syskraken" target="_blank">GitHub</a>
    <a href="https://discord.gg/jV7ymDtH7F" target="_blank">Discord</a>
    <a href="/privacy">Privacy</a>
  </nav>
</header>

<div class="stats hud">
  <div class="eyebrow"><span class="pulse-dot"></span> currently deployed</div>
  <div class="counter" id="counter">–</div>
  <div class="counter-label">captains with the app open right now</div>
  <div class="substats">
    <div class="substat">
      <div class="num" id="region-count">–</div>
      <div class="lbl">regions</div>
    </div>
    <div class="substat">
      <div class="num" id="installs-count">–</div>
      <div class="lbl">total installs</div>
    </div>
  </div>
</div>

<div class="leaderboard hud">
  <h2>By region <span class="updated" id="updated"></span></h2>
  <div class="lb-scroll" id="lb-body"><div class="empty-note">Loading…</div></div>
</div>

<footer>
  Locations approximated from IP (city-level, not exact) · <a href="/privacy">privacy policy</a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Point this at wherever telemetry_server.py is deployed.
  const API_BASE = "https://kraken.protectiva.site";
  const POLL_MS = 5000;

  // ── Google-Maps-style map ──────────────────────────────────
  // The world wraps horizontally (repeats side-to-side like Google Maps),
  // so you can zoom out and pan freely. Only the vertical axis is clamped
  // so you never see gray above/below the poles.
  const map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    worldCopyJump: true,     // markers/view jump seamlessly across world copies
    zoomSnap: 0.25,
    zoomDelta: 0.5,
    maxZoom: 10,
    // Clamp latitude only; longitude is infinite so the world can wrap.
    maxBounds: [[-85.05, -Infinity], [85.05, Infinity]],
    maxBoundsViscosity: 1.0,
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 12,
    // noWrap intentionally OFF → tiles repeat horizontally like Google Maps
  }).addTo(map);

  // Minimum zoom = whatever keeps the map filling the viewport VERTICALLY.
  // (Horizontal is always filled thanks to wrapping.) Web-mercator world
  // height in pixels is 256 * 2^zoom.
  function applyMinZoom(reset){
    const h = map.getSize().y || window.innerHeight;
    const z = Math.ceil(Math.log2(h / 256) * 4) / 4;   // snapped up to 0.25
    map.setMinZoom(z);
    if (reset || map.getZoom() < z){
      map.setView([20, 20], z, { animate: false });
    }
  }
  applyMinZoom(true);

  let userMoved = false;
  map.on('zoomstart dragstart', (e) => { if (e && e.originalEvent) userMoved = true; });
  let rT;
  window.addEventListener('resize', () => {
    clearTimeout(rT);
    rT = setTimeout(() => applyMinZoom(!userMoved), 150);
  });

  // ── Helpers ────────────────────────────────────────────────
  // Flag emoji don't render on Windows (they show as plain letters),
  // so use small flag images instead.
  function flagImg(code){
    if (!code || code.length !== 2 || code === '??') return '<span>🌐</span>';
    const cc = code.toLowerCase();
    return `<img src="https://flagcdn.com/20x15/${cc}.png" width="20" height="15" alt="${cc}" style="border-radius:2px;vertical-align:-2px;">`;
  }
  function esc(s){
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Animated counter tween
  const counterEl = document.getElementById('counter');
  let shownTotal = null;
  function setCounter(target){
    if (shownTotal === null){ shownTotal = target; counterEl.textContent = target.toLocaleString(); return; }
    const from = shownTotal, diff = target - from;
    if (diff === 0) return;
    const t0 = performance.now(), dur = 500;
    function step(t){
      const k = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      counterEl.textContent = Math.round(from + diff * eased).toLocaleString();
      if (k < 1) requestAnimationFrame(step);
      else shownTotal = target;
    }
    requestAnimationFrame(step);
  }

  const connEl = document.getElementById('conn');
  const connTxt = document.getElementById('conn-txt');
  function setConn(ok){
    connEl.classList.toggle('down', !ok);
    connTxt.textContent = ok ? 'online' : 'offline';
  }

  const markers = {};   // client_id -> L.marker
  const icon = L.divIcon({ className: '', html: '<div class="kraken-marker"></div>', iconSize: [12, 12] });

  async function refresh(){
    try{
      const res = await fetch(`${API_BASE}/api/active`, { cache: "no-store" });
      const data = await res.json();
      setConn(true);

      setCounter(data.total);
      document.getElementById('region-count').textContent = data.regions.length;
      document.getElementById('installs-count').textContent = (data.total_installs ?? 0).toLocaleString();
      document.getElementById('updated').textContent =
        'updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // One marker per active user at their city-level location.
      const seen = new Set();
      for(const p of data.points){
        seen.add(p.id);
        const label = p.city ? `${esc(p.city)}, ${esc(p.country)}` : esc(p.country || 'Unknown');
        const popup = `<b>${flagImg(p.country_code)} ${label}</b>`;
        if(markers[p.id]){
          markers[p.id].setLatLng([p.lat, p.lon]);
          markers[p.id].setPopupContent(popup);
        } else {
          markers[p.id] = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popup);
        }
      }
      for(const id of Object.keys(markers)){
        if(!seen.has(id)){ map.removeLayer(markers[id]); delete markers[id]; }
      }

      // Leaderboard — aggregated by country
      const sorted = [...data.regions].sort((a,b) => b.count - a.count);
      const body = document.getElementById('lb-body');
      if(sorted.length === 0){
        body.innerHTML = '<div class="empty-note">No one on the map right now — could be you.</div>';
      } else {
        const max = sorted[0].count;
        body.innerHTML = sorted.map(r => `
          <div class="lb-row">
            <div class="lb-flag">${flagImg(r.code)}</div>
            <div class="lb-name">${esc(r.name)}</div>
            <div class="lb-bar-track"><div class="lb-bar" style="width:${(r.count/max*100).toFixed(0)}%"></div></div>
            <div class="lb-count">${r.count}</div>
          </div>`).join('');
      }
    } catch(e){
      setConn(false);
      console.warn('Fleet tracker: could not reach API', e);
    }
  }

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
